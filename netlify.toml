# ══════════════════════════════════════════════════════════════
# SpiffHQ — Netlify configuration
# ══════════════════════════════════════════════════════════════

[build]
  # No build step — static HTML files deployed as-is from repo root
  publish = "."
  functions = "netlify/functions"

# ── Security headers (VULN-09: Content Security Policy) ────────────
# Applied to every page response. Prevents XSS, clickjacking,
# MIME sniffing, and restricts which resources the page can load.
[[headers]]
  for = "/*"
  [headers.values]

    # CSP: only allow resources from our own domain and known trusted CDNs.
    # firebase* domains needed for Auth + Realtime Database.
    # fonts.googleapis.com / fonts.gstatic.com for Plus Jakarta Sans.
    # gstatic.com for Firebase JS SDK.
    # cdnjs.cloudflare.com for any CDN scripts.
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline'
        https://www.gstatic.com
        https://apis.google.com
        https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com;
      font-src 'self'
        https://fonts.gstatic.com;
      connect-src 'self'
        https://*.firebaseio.com
        https://*.googleapis.com
        https://api.anthropic.com
        wss://*.firebaseio.com;
      img-src 'self' data: https: blob:;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

    # Prevent clickjacking — page can't be embedded in an iframe
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Don't send referrer to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HTTPS only — tell browsers to never use HTTP for this domain
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Disable browser features we don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# ── CORS for Netlify Functions ─────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://spiffhq.com"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# ── Redirect www to apex ───────────────────────────────────────────
[[redirects]]
  from = "https://www.spiffhq.com/*"
  to   = "https://spiffhq.com/:splat"
  status = 301
  force  = true
